services:
  postgres:
    image: postgres:16-alpine
    container_name: ro_latam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ro_latam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ro_latam_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ro.latam
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  zrenderer:
    image: zhade/zrenderer:latest
    container_name: ro_latam_zrenderer
    user: root
    ports:
      - "11011:11011"
    volumes:
      - ./data/zrenderer.conf:/zren/zrenderer.conf
      - ./data/zrenderer-output:/zren/output
      - ./data/zrenderer-resources:/zren/resources
      - ./data/zrenderer-secrets:/zren/secrets
    restart: unless-stopped

volumes:
  postgres_data:
